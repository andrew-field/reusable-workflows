name: Auto tag and release

on:
  push:
    branches: [master]

# Permissions for the GITHUB_TOKEN.
permissions: {}

jobs:
  tag-and-release:
    name: Tag and release
    runs-on: ubuntu-latest

    # Explicitly grant permissions to the GITHUB_TOKEN. Required to push tags and create releases.
    permissions:
      contents: write

    steps:
      # Get the code.
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0 # Required to fetch all tags for semantic versioning

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@a22cf08638b34d5badda920f9daf6e72c477b07b # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # The default version bump is a patch but seems to change with the commit message, e.g. "feat:".

      - name: Create a GitHub release
        run: gh release create "${TAG}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag_version.outputs.new_tag }}
