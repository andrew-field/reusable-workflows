name: Super Linter
# This super linter should be used as a guide and indicator, and is not correct all of the time.

on:
  workflow_call:
    inputs:
      regex_exclude:
        description: "Regex exclude value. Files to exclude from linting."
        required: false
        type: string

  # Include this so the super linter can also run for this reusable-workflows repository.
  push:
    branches: [master]
  pull_request:
    branches: [master]

  # Allows you to run this workflow manually from the Actions tab.
  workflow_dispatch:

# Permissions for the GITHUB_TOKEN.
permissions: {}

jobs:
  build:
    name: Lint Code Base
    runs-on: ubuntu-latest
    permissions: # This workflow is used by both public and private repositories. The read permission is necessary for private repositories.
      # From the super linter example:
      # contents permission to clone the repository
      contents: read
      packages: read
      # issues and pull-requests permissions to write results as pull
      # request comments. Omit them if you don't need summary comments
      issues: write
      pull-requests: write
      # To report GitHub Actions status checks. Omit if you don't need
      # to update commit status
      statuses: write

    steps:
      # Get the code.
      - name: Checkout Code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          # Full git history is needed to get a proper
          # list of changed files within `super-linter`
          fetch-depth: 0

      # Run the super linter.
      - name: Super-Linter
        uses: super-linter/super-linter/slim@4ce20838b8ab83717e78138c5b3a1407148e0918 # v8.7.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Access via the secrets context. The GITHUB_TOKEN is automatically inherited.
          VALIDATE_GO_RELEASER: false
          VALIDATE_GO: false # This is false because VALIDATE_GO_MODULES does all the go linting.
          VALIDATE_JSON_PRETTIER: false # Use biome json formatter instead.
          # One of them should be false, biome seems better and it doesn't respect the filter_regex_exclude so it is easier to use that standard.
          VALIDATE_JSON: false # Use biome json linter instead.
          # One of them should be false, biome seems better and it doesn't respect the filter_regex_exclude so it is easier to use that standard.
          FILTER_REGEX_EXCLUDE: ${{ inputs.regex_exclude }} # Files to exclude from linting.
